apiVersion: v1
kind: Service
metadata:
  name: "catalog-api"
  labels:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
    ai-services.io/component: catalog-backend
spec:
  selector:
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/component: catalog-backend
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      protocol: TCP
